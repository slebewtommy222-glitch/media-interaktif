<!-- Interactive Micro-interactions Script -->
<script>
        document.querySelectorAll('.tactile-button').forEach(button => {
            button.addEventListener('mousedown', () => {
                const clickSound = new Audio('https://www.soundjay.com/buttons/button-37.mp3');
                clickSound.volume = 0.2;
                // clickSound.play(); // Disabled for silent browsing but ready for use
            });
            
            button.addEventListener('mouseenter', () => {
                button.classList.add('scale-105');
            });
            
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-105');
            });
        });

        // Simple parallax effect for the bedroom background
        window.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            const bg = document.querySelector('img[data-alt="Kindergarten Bedroom"]');
            if (bg) {
                bg.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
            }
        });
    </script>
