<style>
        body {
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }

        .tactile-button {
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-shadow: 0 8px 0 #1e5a4d; /* Darker green shadow */
        }

        .tactile-button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #1e5a4d;
        }

        .input-glow:focus {
            box-shadow: 0 0 15px rgba(26, 98, 153, 0.3);
            outline: none;
        }

        .soft-floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .blurred-bg {
            background: linear-gradient(rgba(248, 249, 250, 0.7), rgba(248, 249, 250, 0.7)),
                        url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&q=80&w=2022');
            background-size: cover;
            background-position: center;
            filter: blur(4px);
        }
    </style>

<body class="bg-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative">
<!-- Blurred Background Layer -->
<div class="fixed inset-0 blurred-bg -z-10" data-alt="A soft and dreamlike blurred background of a modern kindergarten classroom. The scene is filled with warm sunlight filtering through windows, illuminating pastel-colored furniture, low bookshelves filled with colorful books, and soft play mats. The overall aesthetic is gentle, safe, and encouraging, using a palette of creams, light blues, and mint greens to create a serene environment for young learners."></div>
<!-- Background Atmospheric Shapes -->
<div class="absolute top-10 left-10 opacity-20 hidden md:block">
<span class="material-symbols-outlined text-[120px] text-primary" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<div class="absolute bottom-10 right-10 opacity-20 hidden md:block">
<span class="material-symbols-outlined text-[140px] text-secondary" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<!-- Main Content Shell (No Nav as per Destination Rule) -->
<main class="relative z-10 w-full max-w-4xl flex flex-col items-center">
<!-- Whiteboard Container -->
<div class="bg-white border-[12px] border-[#d9c499] rounded-[40px] p-8 md:p-16 shadow-2xl w-full flex flex-col items-center relative overflow-visible">
<!-- Friendly Mascot -->
<div class="absolute -top-24 md:-top-32 -right-8 md:-right-20 soft-floating">
<div class="relative w-32 h-32 md:w-48 md:h-48 flex items-center justify-center">
<img alt="Mascot" class="w-full h-full object-cover rounded-full border-8 border-white shadow-lg" data-alt="A cute and friendly illustrated baby bear mascot wearing a small explorer hat. The bear has a gentle, smiling expression with large, expressive eyes that communicate warmth and patience. The illustration style is soft and 3D-like, with a tactile, velvety texture, sitting in a cheerful pose on the corner of the screen. The colors are warm honey browns and soft creams, fitting perfectly into a child-friendly educational interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9lgh9muJJGpqP3riwjz3IXF8BpsnwjUKM5TWhNNxqNyAVT-2tEIYciOEJDlQ9JbjRPD0IKJ7xmlDdHHZ-cSaCjGbBIg17i_obkXumClEKtACeqEA__hu09rLklvoR563ZarYYiHxfy-01dFqgXKDBhvkazJnxY-ORad9pLUKl61XSydzC6LVdCiIZNiWOXWc2ZEQFx7ONjyVChLsJpOeNRsOH8EecGZ3q9CZNtNnOdWsUEiY-0aq-lVZPWrBS9PpJhp2mQrpM89o"/>
</div>
</div>
<!-- Title -->
<h1 class="font-headline-lg-mobile md:font-headline-lg text-primary text-center mb-10">
                Masukkan Nama Kamu
            </h1>
<!-- Input Section -->
<div class="w-full max-w-lg mb-12">
<div class="relative group">
<input class="w-full h-touch-target-min rounded-[24px] border-4 border-outline-variant bg-surface-container-lowest px-8 font-body-lg text-on-surface placeholder:text-outline input-glow transition-all duration-300" id="name-input" maxlength="15" placeholder="Ketik namamu di sini..." type="text"/>
<!-- Decorative Icon inside input -->
<div class="absolute right-6 top-1/2 -translate-y-1/2 text-primary opacity-30">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">edit</span>
</div>
</div>
</div>
<!-- Next Button -->
<button class="tactile-button w-full max-w-xs h-touch-target-min bg-secondary text-on-secondary rounded-[32px] font-label-lg text-label-lg uppercase tracking-wider flex items-center justify-center gap-3" id="next-btn">
                Next
                <span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
<!-- Decorative Star Bubbles -->
<div class="absolute -bottom-6 -left-6 flex gap-3">
<div class="w-12 h-12 bg-tertiary-fixed rounded-full flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-on-tertiary-fixed" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<div class="w-10 h-10 bg-primary-fixed rounded-full flex items-center justify-center shadow-md mt-4">
<span class="material-symbols-outlined text-on-primary-fixed" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
</div>
<!-- Footnote / Guidance -->
<p class="mt-8 font-body-md text-on-surface-variant text-center opacity-70">
            Ayo kita mulai petualangan pintarmu!
        </p>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const nextBtn = document.getElementById('next-btn');
            const nameInput = document.getElementById('name-input');

            // Micro-interaction for input focus
            nameInput.addEventListener('focus', () => {
                nameInput.parentElement.classList.add('scale-105');
                nameInput.parentElement.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            });

            nameInput.addEventListener('blur', () => {
                nameInput.parentElement.classList.remove('scale-105');
            });

            // Button click interaction
            nextBtn.addEventListener('click', () => {
                const name = nameInput.value.trim();
                if (name) {
                    // Visual feedback for success
                    nextBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
                    setTimeout(() => {
                        nextBtn.innerHTML = 'Hore! ✨';
                        nextBtn.style.backgroundColor = '#1a6299'; // Primary color shift
                    }, 800);
                } else {
                    // Shake animation for empty input
                    nameInput.classList.add('border-error');
                    nameInput.animate([
                        { transform: 'translateX(0px)' },
                        { transform: 'translateX(-10px)' },
                        { transform: 'translateX(10px)' },
                        { transform: 'translateX(-10px)' },
                        { transform: 'translateX(0px)' }
                    ], { duration: 300 });
                    
                    setTimeout(() => nameInput.classList.remove('border-error'), 1000);
                }
            });

            // Allow "Enter" key to trigger next
            nameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    nextBtn.click();
                }
            });
        });
    </script>
</body></html>
