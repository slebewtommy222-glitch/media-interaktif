<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Retro shadow for the whole kid -->
  <g transform="translate(6, 6)" opacity="0.15">
    <!-- Body Shadow -->
    <rect x="90" y="220" width="120" height="150" rx="30" fill="#000" />
    <!-- Head Shadow -->
    <circle cx="150" cy="140" r="70" fill="#000" />
  </g>
  
  <!-- Kid Body / Clothes -->
  <!-- Orange shirt (#FF6B35) with yellow collar, neo-brutalist border -->
  <rect x="90" y="220" width="120" height="150" rx="30" fill="#FF6B35" stroke="#1a1a1a" stroke-width="5" />
  <!-- Collar/Design -->
  <path d="M 120,220 L 150,250 L 180,220" fill="#FFD600" stroke="#1a1a1a" stroke-width="4" />
  
  <!-- Kid Hands -->
  <circle cx="70" cy="270" r="22" fill="#FFE0B2" stroke="#1a1a1a" stroke-width="4" />
  <circle cx="230" cy="270" r="22" fill="#FFE0B2" stroke="#1a1a1a" stroke-width="4" />
  <!-- Arms -->
  <path d="M 92,235 C 75,245 70,260 70,270" stroke="#1a1a1a" stroke-width="5" fill="none" />
  <path d="M 208,235 C 225,245 230,260 230,270" stroke="#1a1a1a" stroke-width="5" fill="none" />
  
  <!-- Head/Face -->
  <circle cx="150" cy="140" r="70" fill="#FFE0B2" stroke="#1a1a1a" stroke-width="5" />
  
  <!-- Hair (Cute brown hair) -->
  <path d="M 80,140 C 80,85 220,85 220,140 C 220,130 200,105 150,110 C 100,105 80,130 80,140 Z" fill="#5D4037" stroke="#1a1a1a" stroke-width="5" />
  
  <!-- Cute yellow cap -->
  <path d="M 85,115 C 95,65 205,65 215,115" fill="#FFD600" stroke="#1a1a1a" stroke-width="5" />
  <ellipse cx="150" cy="65" rx="10" ry="10" fill="#FF6B35" stroke="#1a1a1a" stroke-width="4" />
  
  <!-- Eyes -->
  <!-- Left Eye -->
  <circle cx="120" cy="145" r="9" fill="#1a1a1a" />
  <circle cx="117" cy="142" r="3" fill="#ffffff" />
  <!-- Right Eye -->
  <circle cx="180" cy="145" r="9" fill="#1a1a1a" />
  <circle cx="177" cy="142" r="3" fill="#ffffff" />
  
  <!-- Cheeks (Blush) -->
  <circle cx="105" cy="165" r="8" fill="#FF8A80" opacity="0.7" />
  <circle cx="195" cy="165" r="8" fill="#FF8A80" opacity="0.7" />
  
  <!-- Mouth (Cute wide smile) -->
  <path d="M 135,165 Q 150,185 165,165" fill="#FF5252" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Ears -->
  <circle cx="77" cy="145" r="12" fill="#FFE0B2" stroke="#1a1a1a" stroke-width="4" />
  <circle cx="223" cy="145" r="12" fill="#FFE0B2" stroke="#1a1a1a" stroke-width="4" />
</svg>
