<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" width="100" height="150">
  <!-- Retro Shadow -->
  <rect x="15" y="15" width="70" height="120" rx="15" fill="#1a1a1a" />
  <!-- Main Phone Body -->
  <rect x="10" y="10" width="70" height="120" rx="15" fill="#FF6B35" stroke="#1a1a1a" stroke-width="4" />
  <!-- Screen -->
  <rect x="18" y="22" width="54" height="85" rx="8" fill="#E8F5E9" stroke="#1a1a1a" stroke-width="3" />
  <!-- Screen content (cute smile) -->
  <path d="M 38,65 Q 45,75 52,65" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" />
  <circle cx="36" cy="55" r="3" fill="#1a1a1a" />
  <circle cx="54" cy="55" r="3" fill="#1a1a1a" />
  <!-- Home Button -->
  <circle cx="45" cy="118" r="6" fill="#1a1a1a" />
  <!-- Camera speaker -->
  <line x1="40" y1="16" x2="50" y2="16" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" />
</svg>
