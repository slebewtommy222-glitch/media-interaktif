<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="roofGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </radialGradient>
    <radialGradient id="wallGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </radialGradient>
  </defs>
  <!-- Shadow base -->
  <ellipse cx="100" cy="185" rx="55" ry="10" fill="rgba(0,0,0,0.15)"/>
  <!-- House wall -->
  <rect x="42" y="105" width="116" height="82" rx="8" fill="url(#wallGrad)" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Roof triangle -->
  <polygon points="100,22 168,108 32,108" fill="url(#roofGrad)" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>
  <!-- Chimney -->
  <rect x="130" y="35" width="18" height="40" rx="4" fill="#FF8A65" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Door -->
  <rect x="82" y="133" width="36" height="54" rx="8" fill="#A0522D" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Door knob -->
  <circle cx="111" cy="162" r="4" fill="#FFD600" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Window left -->
  <rect x="52" y="118" width="24" height="24" rx="5" fill="#87CEEB" stroke="#1a1a1a" stroke-width="3.5"/>
  <line x1="64" y1="118" x2="64" y2="142" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="52" y1="130" x2="76" y2="130" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Window right -->
  <rect x="124" y="118" width="24" height="24" rx="5" fill="#87CEEB" stroke="#1a1a1a" stroke-width="3.5"/>
  <line x1="136" y1="118" x2="136" y2="142" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="124" y1="130" x2="148" y2="130" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Star on roof -->
  <circle cx="100" cy="62" r="10" fill="#FFD600" stroke="#1a1a1a" stroke-width="3"/>
  <text x="100" y="67" font-size="13" text-anchor="middle" fill="#1a1a1a">★</text>
</svg>
